server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip basico para reducir el peso del bundle.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agresiva para los assets versionados de Vite (hash en el nombre).
    location /assets/ {
        try_files $uri =404;
        expires   1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: cualquier ruta no resuelta como archivo sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
